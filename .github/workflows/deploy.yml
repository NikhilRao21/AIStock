name: Deploy To Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail

            APP_DIR="/opt/AIStock"
            REPO_URL="https://github.com/NikhilRao21/AIStock.git"
            CONDA_BIN="/home/opc/miniconda3/bin/conda"
            CONDA_ENV_PREFIX="$APP_DIR/.conda-env"

            if [ ! -x "$CONDA_BIN" ]; then
              echo "Conda not found at $CONDA_BIN"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR" || true

            PREV_COMMIT=""
            if git rev-parse --verify HEAD >/dev/null 2>&1; then
              PREV_COMMIT="$(git rev-parse HEAD)"
            fi

            git fetch origin main
            TARGET_COMMIT="$(git rev-parse origin/main)"
            git checkout -f "$TARGET_COMMIT"

            if [ ! -x "$CONDA_ENV_PREFIX/bin/python" ]; then
              "$CONDA_BIN" create -y -p "$CONDA_ENV_PREFIX" python=3.12 pip
            fi

            "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" pip install --upgrade pip
            "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" pip install -r requirements.txt

            # Smoke tests before touching systemd so import/runtime issues are visible early.
            "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" python -c "import sys; print(sys.executable)"
            "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" python -c "import pkgutil; print('python-smoke-ok')"

            set +e
            sudo systemctl restart aistock-paper.service
            RESTART_RC=$?
            set -e

            if [ "$RESTART_RC" -ne 0 ]; then
              echo "aistock-paper.service restart failed (rc=$RESTART_RC). Printing diagnostics..."
              sudo systemctl status aistock-paper.service --no-pager || true
              sudo journalctl -u aistock-paper.service -n 200 --no-pager || true

              if [ -n "$PREV_COMMIT" ]; then
                git checkout -f "$PREV_COMMIT"
                "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" pip install -r requirements.txt

                set +e
                sudo systemctl restart aistock-paper.service
                ROLLBACK_RC=$?
                set -e

                if [ "$ROLLBACK_RC" -ne 0 ]; then
                  echo "Rollback restart also failed (rc=$ROLLBACK_RC). Printing rollback diagnostics..."
                  sudo systemctl status aistock-paper.service --no-pager || true
                  sudo journalctl -u aistock-paper.service -n 200 --no-pager || true
                fi
              fi

              exit 1
            fi

            set +e
            sudo systemctl is-active --quiet aistock-paper.service
            ACTIVE_RC=$?
            set -e

            if [ "$ACTIVE_RC" -ne 0 ]; then
              echo "aistock-paper.service is not active after restart (rc=$ACTIVE_RC). Printing diagnostics..."
              sudo systemctl status aistock-paper.service --no-pager || true
              sudo journalctl -u aistock-paper.service -n 200 --no-pager || true
              exit 1
            fi

            sudo systemctl status aistock-paper.service --no-pager