name: Deploy To Server

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT || 22 }}
          script: |
            set -euo pipefail

            APP_DIR="/opt/AIStock"
            REPO_URL="https://github.com/NikhilRao21/AIStock.git"
            CONDA_BIN="/home/opc/miniconda3/bin/conda"
            CONDA_ENV_PREFIX="$APP_DIR/.conda-env"

            if [ ! -x "$CONDA_BIN" ]; then
              echo "Conda not found at $CONDA_BIN"
              exit 1
            fi

            if [ ! -d "$APP_DIR/.git" ]; then
              mkdir -p "$APP_DIR"
              git clone "$REPO_URL" "$APP_DIR"
            fi

            cd "$APP_DIR"
            git config --global --add safe.directory "$APP_DIR" || true

            PREV_COMMIT=""
            if git rev-parse --verify HEAD >/dev/null 2>&1; then
              PREV_COMMIT="$(git rev-parse HEAD)"
            fi

            git fetch origin main
            TARGET_COMMIT="$(git rev-parse origin/main)"
            git checkout -f "$TARGET_COMMIT"

            if [ ! -x "$CONDA_ENV_PREFIX/bin/python" ]; then
              "$CONDA_BIN" create -y -p "$CONDA_ENV_PREFIX" python=3.12 pip
            fi

            "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" pip install --upgrade pip
            "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" pip install -r requirements.txt

            # Smoke tests before touching systemd so import/runtime issues are visible early.
            "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" python -c "import sys; print(sys.executable)"
            "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" python -c "import pkgutil; print('python-smoke-ok')"

            sudo mkdir -p "$APP_DIR/data"

            SERVICE_USER="${{ secrets.SERVER_USER }}"
            SERVICE_GROUP="$(id -gn "$SERVICE_USER")"
            CYCLE_INTERVAL_MINS="5"
            if [ -f "$APP_DIR/.env" ]; then
              ENV_INTERVAL="$(grep -E '^CYCLE_INTERVAL_MINS=' "$APP_DIR/.env" | tail -n 1 | cut -d= -f2- | tr -d '[:space:]')"
              if [ -n "$ENV_INTERVAL" ]; then
                CYCLE_INTERVAL_MINS="$ENV_INTERVAL"
              fi
            fi
            if ! [[ "$CYCLE_INTERVAL_MINS" =~ ^[0-9]+$ ]] || [ "$CYCLE_INTERVAL_MINS" -lt 1 ] || [ "$CYCLE_INTERVAL_MINS" -gt 60 ]; then
              echo "Invalid CYCLE_INTERVAL_MINS=$CYCLE_INTERVAL_MINS"
              exit 1
            fi
            MINUTE_LIST="$(seq -s, -f '%02g' 0 "$CYCLE_INTERVAL_MINS" 59)"

            # Fresh start on every deploy: remove and recreate the entire data directory.
            sudo rm -rf "$APP_DIR/data"
            sudo install -d -o "$SERVICE_USER" -g "$SERVICE_GROUP" -m 775 "$APP_DIR/data"

            # One-shot trading run service; invoked by timer during market hours.
            printf '%s\n' \
              '[Unit]' \
              'Description=AIStock Trader One Cycle' \
              'After=network-online.target' \
              'Wants=network-online.target' \
              '' \
              '[Service]' \
              'Type=oneshot' \
              "User=$SERVICE_USER" \
              "WorkingDirectory=$APP_DIR" \
              "Environment=PYTHONPATH=$APP_DIR/src" \
              "EnvironmentFile=$APP_DIR/.env" \
              "Environment=BUY_ONLY_DURING_MARKET_HOURS=true" \
              "Environment=DISPLAY_TIMEZONE=America/New_York" \
              "ExecStart=$CONDA_ENV_PREFIX/bin/python $APP_DIR/scripts/run_cycle.py" \
              | sudo tee /etc/systemd/system/aistock-trader.service >/dev/null

            # Run every CYCLE_INTERVAL_MINS minutes during US market hours (Mon-Fri, 13:00-20:00 UTC).
            printf '%s\n' \
              '[Unit]' \
              'Description=AIStock Trader Schedule (Market Hours)' \
              '' \
              '[Timer]' \
              "OnCalendar=Mon..Fri *-*-* 13,14,15,16,17,18,19:${MINUTE_LIST}:00 UTC" \
              'OnCalendar=Mon..Fri *-*-* 20:00:00 UTC' \
              'Persistent=true' \
              'Unit=aistock-trader.service' \
              '' \
              '[Install]' \
              'WantedBy=timers.target' \
              | sudo tee /etc/systemd/system/aistock-trader.timer >/dev/null

            # Dashboard web service.
            printf '%s\n' \
              '[Unit]' \
              'Description=AIStock Dashboard Web Server' \
              'After=network-online.target' \
              'Wants=network-online.target' \
              '' \
              '[Service]' \
              'Type=simple' \
              "User=$SERVICE_USER" \
              "WorkingDirectory=$APP_DIR/data" \
              "ExecStart=$CONDA_ENV_PREFIX/bin/python -m http.server 8080 --bind 0.0.0.0" \
              'Restart=always' \
              'RestartSec=10' \
              '' \
              '[Install]' \
              'WantedBy=multi-user.target' \
              | sudo tee /etc/systemd/system/aistock-dashboard.service >/dev/null

            sudo systemctl daemon-reload
            sudo systemctl disable --now aistock-paper.service || true
            sudo systemctl enable --now aistock-dashboard.service
            sudo systemctl enable --now aistock-trader.timer

            # Start a one-time cycle only to verify trader service wiring after deploy.
            sudo systemctl start aistock-trader.service

            set +e
            sudo systemctl is-active --quiet aistock-dashboard.service
            DASHBOARD_RC=$?
            set -e

            if [ "$DASHBOARD_RC" -ne 0 ]; then
              echo "aistock-dashboard.service is not active (rc=$DASHBOARD_RC). Printing diagnostics..."
              sudo systemctl status aistock-dashboard.service --no-pager || true
              sudo journalctl -u aistock-dashboard.service -n 200 --no-pager || true

              if [ -n "$PREV_COMMIT" ]; then
                git checkout -f "$PREV_COMMIT"
                "$CONDA_BIN" run -p "$CONDA_ENV_PREFIX" pip install -r requirements.txt
              fi

              exit 1
            fi

            set +e
            sudo systemctl is-active --quiet aistock-trader.timer
            TIMER_ACTIVE_RC=$?
            sudo systemctl is-enabled --quiet aistock-trader.timer
            TIMER_ENABLED_RC=$?
            set -e

            if [ "$TIMER_ACTIVE_RC" -ne 0 ] || [ "$TIMER_ENABLED_RC" -ne 0 ]; then
              echo "aistock-trader.timer is not active/enabled (active_rc=$TIMER_ACTIVE_RC enabled_rc=$TIMER_ENABLED_RC)."
              sudo systemctl status aistock-trader.timer --no-pager || true
              sudo journalctl -u aistock-trader.timer -n 200 --no-pager || true
              exit 1
            fi

            sudo systemctl status aistock-dashboard.service --no-pager
            sudo systemctl status aistock-trader.timer --no-pager
            sudo systemctl status aistock-trader.service --no-pager || true